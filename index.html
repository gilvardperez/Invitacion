<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invitación Baby Shower</title>
  <meta name="description" content="Invitación al baby shower" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#2f2f2f;
      --muted:#616161;
      --pink:#f06f96;
      --pink2:#ff93b3;
      --page:#fff7f9;
      --card: rgba(255,255,255,.82);
      --radius: 16px;
      --borderW: 10px;
      --borderC: rgba(240,111,150,.38);
      --shadow: 0 18px 55px rgba(40, 18, 26, .14);
      --btnRadius: 16px;
      --btnH: 52px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(255,147,179,.14), transparent 58%),
        radial-gradient(900px 600px at 85% 20%, rgba(240,111,150,.10), transparent 62%),
        var(--page);
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .wrap{ width:min(520px, 100%); }

    .card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      border: var(--borderW) solid var(--borderC);
      transform: translateY(8px);
      opacity:0;
      animation: enter .45s ease forwards;
      backdrop-filter: blur(8px);
    }

    @keyframes enter{ to{ transform:translateY(0); opacity:1; } }

    .card::before, .card::after{
      content:"";
      position:absolute;
      width:250px;height:250px;
      pointer-events:none;
      opacity:.45;
    }
    .card::before{
      left:-120px; top:-130px;
      background: radial-gradient(circle at 35% 35%, rgba(255,147,179,.52), rgba(255,147,179,0) 62%);
    }
    .card::after{
      right:-140px; bottom:-170px;
      background: radial-gradient(circle at 40% 40%, rgba(240,111,150,.40), rgba(240,111,150,0) 65%);
    }

    /* ====== BARRA DE BIENVENIDA ====== */
    .welcome-bar{
      background: linear-gradient(180deg, #fce4ec, #fff0f3);
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid rgba(240,111,150,.15);
      position: relative;
      z-index: 1;
    }

    .welcome-bar .animal{
      display: inline-block;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .welcome-bar .welcome-text{
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      color: var(--pink);
      letter-spacing: .08em;
      line-height: 1.3;
    }
    .welcome-bar .welcome-text span{
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: #999;
      letter-spacing: .04em;
      margin-top: 1px;
    }

    /* Animación de saludo (manita) */
    @keyframes wave{
      0%, 100%{ transform: rotate(0deg); }
      15%{ transform: rotate(14deg); }
      30%{ transform: rotate(-8deg); }
      45%{ transform: rotate(14deg); }
      60%{ transform: rotate(-4deg); }
      75%{ transform: rotate(10deg); }
    }

    .paw{
      transform-origin: 70% 80%;
      animation: wave 2.5s ease-in-out infinite;
    }

    /* Desfasar animaciones para que no saluden al mismo tiempo */
    .animal:nth-child(1) .paw{ animation-delay: 0s; }
    .animal:nth-child(3) .paw{ animation-delay: .4s; }
    .animal:nth-child(5) .paw{ animation-delay: .8s; }

    /* Pequeño bounce de entrada para cada animalito */
    @keyframes popIn{
      0%{ transform: scale(0) rotate(-10deg); opacity:0; }
      60%{ transform: scale(1.1) rotate(2deg); opacity:1; }
      100%{ transform: scale(1) rotate(0deg); opacity:1; }
    }
    .animal{ animation: popIn .5s ease forwards; opacity:0; }
    .animal:nth-child(1){ animation-delay: .1s; }
    .animal:nth-child(3){ animation-delay: .25s; }
    .animal:nth-child(5){ animation-delay: .4s; }

    header{ padding:14px 16px 4px; text-align:center; }

    .title{
      font-weight:800;
      letter-spacing:.22em;
      font-size:14px;
      color:#585858;
    }

    .icon-wrap{
      margin:12px auto 4px;
      width:110px; height:110px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background: rgba(255,240,245,.65);
      border: 1px dashed rgba(240,111,150,.30);
      animation: softBounce 2.8s ease-in-out infinite;
    }

    @keyframes softBounce{
      0%, 100%{ transform: translateY(0); }
      50%{ transform: translateY(-6px); }
    }

    .icon-wrap svg{
      width:68px; height:68px;
      animation: rock 3.2s ease-in-out infinite;
      transform-origin: 50% 90%;
    }

    @keyframes rock{
      0%, 100%{ transform: rotate(0deg); }
      25%{ transform: rotate(4deg); }
      75%{ transform: rotate(-4deg); }
    }

    .subtitle{
      padding: 0 16px 12px;
      text-align:center;
      color:var(--muted);
      font-weight:300;
      line-height:1.55;
      font-size:14px;
    }

    .divider{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:0 16px;
      margin:2px 0 10px;
    }
    .divider span{
      height:2px;
      width:100%;
      max-width:140px;
      background: linear-gradient(90deg, transparent, rgba(240,111,150,.95), transparent);
      border-radius:999px;
      opacity:.70;
    }

    .when{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:10px;
      padding: 4px 16px 4px;
      text-align:center;
    }
    .when .side{
      font-weight:700;
      color:#4f4f4f;
      font-size:14px;
    }
    .when .big{
      font-size:42px;
      line-height:1;
      font-weight:800;
      color:#2b2b2b;
    }
    .when .month{
      grid-column:2;
      margin-top:0;
      font-size:12px;
      letter-spacing:.16em;
      color:#666;
      text-transform:uppercase;
      font-weight:700;
    }

    .where{
      padding: 8px 16px 0;
      text-align:center;
      font-size:13px;
      color:#5c5c5c;
      line-height:1.55;
    }
    .where b{ color:#3c3c3c; }

    .headline{
      padding: 14px 16px 8px;
      text-align:center;
      font-size:26px;
      font-weight:800;
      color: var(--pink);
    }

    .rsvp{
      padding: 6px 16px 12px;
      display:grid;
      gap:10px;
    }
    .rsvp p{
      margin:0;
      text-align:center;
      font-size:13px;
      color:#666;
      font-weight:700;
    }

    .row{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:10px;
    }
    input{
      width:100%;
      height: var(--btnH);
      padding: 0 12px;
      border-radius: var(--btnRadius);
      border:1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.92);
      outline:none;
      font-size:14px;
    }
    input:focus{
      border-color: rgba(240,111,150,.55);
      box-shadow: 0 0 0 4px rgba(240,111,150,.14);
    }

    .actions{
      display:grid;
      gap:10px;
      padding: 0 16px 16px;
    }

    .btn{
      height: var(--btnH);
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border-radius: var(--btnRadius);
      border:1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.96);
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      color:#333;
      text-decoration:none;
      transition: transform .06s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,.08);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{ border-color: rgba(240,111,150,.32); }
    .btn:active{ transform: translateY(1px); box-shadow: 0 8px 18px rgba(0,0,0,.07); }

    .btn.primary{
      background: linear-gradient(180deg, var(--pink2), var(--pink));
      color:white;
      border-color: rgba(255,255,255,.22);
    }
    .btn.outline{
      background: rgba(255,255,255,.92);
      border-color: rgba(240,111,150,.34);
      color: #2f2f2f;
    }
    .btn.disabled{
      cursor: default;
      background: rgba(255,255,255,.72);
      border-color: rgba(240,111,150,.18);
      color:#474747;
      box-shadow: none;
    }
    .btn.disabled:active{ transform:none; }
    .btn small{ font-weight:800; opacity:.85; }

    @media (max-width:420px){
      .row{ grid-template-columns:1fr; }
      .headline{ font-size:24px; }
      .welcome-bar{ gap:6px; padding: 12px 12px 8px; }
      .welcome-bar .animal{ width:42px; height:42px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Invitación">

      <!-- ====== BARRA DE BIENVENIDA CON ANIMALITOS ====== -->
      <div class="welcome-bar">

        <!-- 🐻 Osito saludando -->
        <div class="animal">

            <circle cx="25" cy="24" r=".8" fill="#fff"/>

              <ellipse cx="10" cy="44" rx="5" ry="4" fill="#f3c8a0" transform="rotate(-20,10,44)"/>

            <ellipse cx="50" cy="50" rx="5" ry="4" fill="#f3c8a0" transform="rotate(15,50,50)"/>

        <!-- Separador decorativo -->
        <div class="animal" style="width:6px; height:6px; background:var(--pink); border-radius:50%; opacity:.35; flex-shrink:0; align-self:center;"></div>

        <!-- 🐰 Conejito saludando -->

          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <!-- Orejas largas -->
            <ellipse cx="22" cy="10" rx="5" ry="14" fill="#fce4ec"/>
            <ellipse cx="38" cy="10" rx="5" ry="14" fill="#fce4ec"/>
            <ellipse cx="22" cy="10" rx="2.5" ry="10" fill="#f8b4c8"/>
            <ellipse cx="38" cy="10" rx="2.5" ry="10" fill="#f8b4c8"/>
            <!-- Cabeza -->
            <circle cx="30" cy="30" r="16" fill="#fce4ec"/>
            <!-- Ojos -->
            <circle cx="24" cy="27" r="2" fill="#3a2a26"/>
            <circle cx="36" cy="27" r="2" fill="#3a2a26"/>
            <circle cx="25" cy="26" r=".8" fill="#fff"/>
            <circle cx="37" cy="26" r=".8" fill="#fff"/>
            <!-- Nariz -->
            <ellipse cx="30" cy="32" rx="2" ry="1.5" fill="#f8b4c8"/>
            <!-- Bigotes -->
            <line x1="18" y1="31" x2="26" y2="32" stroke="#dab8a0" stroke-width=".6"/>
            <line x1="18" y1="34" x2="26" y2="33" stroke="#dab8a0" stroke-width=".6"/>
            <line x1="42" y1="31" x2="34" y2="32" stroke="#dab8a0" stroke-width=".6"/>
            <line x1="42" y1="34" x2="34" y2="33" stroke="#dab8a0" stroke-width=".6"/>
            <!-- Boca -->
            <path d="M27 35 q3 2.5 6 0" stroke="#c97878" stroke-width="1" fill="none" stroke-linecap="round"/>
            <!-- Mejillas -->
            <circle cx="19" cy="33" r="3" fill="#f8b4c8" opacity=".40"/>
            <circle cx="41" cy="33" r="3" fill="#f8b4c8" opacity=".40"/>
            <!-- Cuerpo -->
            <ellipse cx="30" cy="52" rx="12" ry="9" fill="#fce4ec"/>
            <!-- Manita saludando -->
            <g class="paw">
              <ellipse cx="12" cy="46" rx="4" ry="3.5" fill="#fce4ec" transform="rotate(-25,12,46)"/>
            </g>
            <ellipse cx="48" cy="50" rx="4" ry="3.5" fill="#fce4ec" transform="rotate(15,48,50)"/>
          </svg>
        </div>

        <!-- Separador decorativo -->
        <div class="animal" style="width:6px; height:6px; background:var(--pink); border-radius:50%; opacity:.35; flex-shrink:0; align-self:center;"></div>

        <!-- 🐥 Patito saludando -->
        <div class="animal">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <!-- Cabeza -->
            <circle cx="30" cy="24" r="15" fill="#fff4b8"/>
            <!-- Pelito -->
            <path d="M28 9 q2-4 4 0" stroke="#f0d060" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M32 10 q2-3 3 1" stroke="#f0d060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- Ojos -->
            <circle cx="24" cy="21" r="2" fill="#3a2a26"/>
            <circle cx="36" cy="21" r="2" fill="#3a2a26"/>
            <circle cx="25" cy="20" r=".8" fill="#fff"/>
            <circle cx="37" cy="20" r=".8" fill="#fff"/>
            <!-- Pico -->
            <ellipse cx="30" cy="29" rx="5" ry="3" fill="#f0a830"/>
            <!-- Mejillas -->
            <circle cx="20" cy="27" r="3" fill="#f8b4c8" opacity=".40"/>
            <circle cx="40" cy="27" r="3" fill="#f8b4c8" opacity=".40"/>
            <!-- Cuerpo -->
            <ellipse cx="30" cy="48" rx="14" ry="12" fill="#fff4b8"/>
            <!-- Alita saludando -->
            <g class="paw">
              <ellipse cx="11" cy="42" rx="5" ry="4" fill="#ffe88a" transform="rotate(-20,11,42)"/>
            </g>
            <!-- Otra alita quieta -->
            <ellipse cx="49" cy="48" rx="5" ry="4" fill="#ffe88a" transform="rotate(15,49,48)"/>
            <!-- Patitas -->
            <ellipse cx="25" cy="58" rx="4" ry="2" fill="#f0a830"/>
            <ellipse cx="35" cy="58" rx="4" ry="2" fill="#f0a830"/>
          </svg>
        </div>

      </div>

      <header>
        <div class="title">MI BABY SHOWER</div>

        <div class="icon-wrap">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="82" r="8" fill="#f8b4c8" stroke="#e8819e" stroke-width="2"/>
            <circle cx="68" cy="82" r="8" fill="#f8b4c8" stroke="#e8819e" stroke-width="2"/>
            <circle cx="32" cy="82" r="3" fill="#fff" opacity=".6"/>
            <circle cx="68" cy="82" r="3" fill="#fff" opacity=".6"/>
            <line x1="32" y1="82" x2="68" y2="82" stroke="#e8819e" stroke-width="2"/>
            <path d="M22 52 c0 0, 2 22, 14 22 l28 0 c12 0, 14-22, 14-22 Z"
                  fill="#fce4ec" stroke="#e8819e" stroke-width="2" stroke-linejoin="round"/>
            <path d="M22 52 c0 0, 4-28, 28-28 c24 0, 28 28, 28 28"
                  fill="#f8b4c8" stroke="#e8819e" stroke-width="2" stroke-linejoin="round"/>
            <path d="M78 52 c6 2, 8 8, 6 14" stroke="#e8819e" stroke-width="3" stroke-linecap="round" fill="none"/>
            <circle cx="83" cy="68" r="3" fill="#e8819e"/>
            <circle cx="50" cy="46" r="12" fill="#fde8d0"/>
            <circle cx="46" cy="44" r="1.5" fill="#5a4a42"/>
            <circle cx="54" cy="44" r="1.5" fill="#5a4a42"/>
            <path d="M47 49 q3 3 6 0" stroke="#e8819e" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <circle cx="43" cy="48" r="2.5" fill="#f8b4c8" opacity=".5"/>
            <circle cx="57" cy="48" r="2.5" fill="#f8b4c8" opacity=".5"/>
            <path d="M38 40 q0-10 12-12 q12 2 12 12" fill="#f8b4c8" stroke="#e8819e" stroke-width="1.5"/>
            <circle cx="50" cy="27" r="3" fill="#f06f96"/>
            <path d="M34 60 q16 8 32 0" fill="#fce4ec" stroke="#e8819e" stroke-width="1.2" opacity=".7"/>
            <g fill="#f06f96" opacity=".45">
              <polygon points="15,30 16,33 19,33 17,35 18,38 15,36 12,38 13,35 11,33 14,33"/>
              <polygon points="85,25 86,28 89,28 87,30 88,33 85,31 82,33 83,30 81,28 84,28"/>
              <polygon points="12,60 13,62 15,62 13.5,63.5 14,66 12,64.5 10,66 10.5,63.5 9,62 11,62"/>
            </g>
          </svg>
        </div>
      </header>

      <div class="subtitle">
        Queremos celebrar contigo la futura llegada de nuestra bebé
      </div>

      <div class="divider" aria-hidden="true"><span></span><span></span></div>

      <div class="when">
        <div class="side" id="dayName">Domingo</div>
        <div class="big" id="dayNum">08</div>
        <div class="side" id="timeTxt">11:00 a.m.</div>
        <div class="month" id="monthTxt">Marzo</div>
      </div>

      <div class="where">
        <b id="placeName">Old West Restaurant</b><br/>
        <span id="placeAddr">10 calle 4-33 Barrio Colombita, Coatepeque.</span>
      </div>

      <div class="headline">¡Te esperamos!</div>

      <div class="rsvp">
        <p>Confirma tu asistencia</p>
        <div class="row">
          <input id="guestName" type="text" placeholder="Tu nombre" autocomplete="name" />
          <input id="guestCount" type="number" inputmode="numeric" min="1" value="1" />
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnWhatsApp">Confirmar por WhatsApp</button>
        <a class="btn outline" id="btnMaps" target="_blank" rel="noopener">Abrir ubicación</a>
        <div class="btn disabled" aria-live="polite">
          Tiempo faltante: <small id="countdown">—</small>
        </div>
      </div>
    </section>
  </main>

  <script>
    const EVENT = {
      dateISO: "2026-03-08T11:00:00",
      dayName: "Domingo",
      dayNum: "08",
      monthTxt: "Marzo",
      timeTxt: "11:00 a.m.",
      placeName: "Old West Restaurant",
      placeAddr: "10 calle 4-33 Barrio Colombita, Coatepeque.",
      whatsappNumber: "50241415151",
      mapsUrl: "https://maps.google.com/?q=Old%20West%20Restaurant%20Coatepeque"
    };

    dayName.textContent = EVENT.dayName;
    dayNum.textContent = EVENT.dayNum;
    monthTxt.textContent = EVENT.monthTxt;
    timeTxt.textContent = EVENT.timeTxt;
    placeName.textContent = EVENT.placeName;
    placeAddr.textContent = EVENT.placeAddr;
    btnMaps.href = EVENT.mapsUrl;

    const params = new URLSearchParams(location.search);
    const pName = params.get("name");
    const pCount = params.get("count");
    if (pName) guestName.value = pName;
    if (pCount && !Number.isNaN(Number(pCount))) guestCount.value = String(Math.max(1, Number(pCount)));

    function buildMessage(){
      const name = (guestName.value || "").trim() || "Invitado/a";
      const count = Math.max(1, Number(guestCount.value || 1));
      return `Hola. Soy ${name}.\nConfirmo mi asistencia al Baby Shower.\nAsistentes: ${count}.\n¡Gracias!`;
    }

    btnWhatsApp.addEventListener("click", () => {
      const text = encodeURIComponent(buildMessage());
      window.open(`https://wa.me/${EVENT.whatsappNumber}?text=${text}`, "_blank", "noopener");
      if (navigator.vibrate) navigator.vibrate(18);
    });

    const eventDate = new Date(EVENT.dateISO);
    const pad2 = (n) => String(n).padStart(2, "0");

    function formatCountdown(ms){
      if (ms <= 0) return "¡Hoy!";
      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;
      if (days > 0) return `${days}d ${pad2(hours)}h ${pad2(mins)}m`;
      return `${pad2(hours)}h ${pad2(mins)}m ${pad2(secs)}s`;
    }

    function tick(){
      countdown.textContent = formatCountdown(eventDate - new Date());
    }
    tick();
    setInterval(tick, 250);
  </script>
</body>
</html>
