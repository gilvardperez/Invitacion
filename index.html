<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invitación Baby Shower</title>
  <meta name="description" content="Invitación al baby shower" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#2f2f2f;
      --muted:#616161;
      --pink:#f06f96;
      --pink2:#ff93b3;
      --page:#fff7f9;
      --card: rgba(255,255,255,.82);
      --radius: 16px;
      --borderW: 10px;
      --borderC: rgba(240,111,150,.38);
      --shadow: 0 18px 55px rgba(40, 18, 26, .14);
      --btnRadius: 16px;
      --btnH: 52px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(255,147,179,.14), transparent 58%),
        radial-gradient(900px 600px at 85% 20%, rgba(240,111,150,.10), transparent 62%),
        var(--page);
      min-height:100svh;
      overflow-x:hidden;
    }

    /* =============================================
       INTRO / SPLASH SCREEN (5s)
       ============================================= */
    .intro{
      position:fixed;
      inset:0;
      z-index:1000;
      display:grid;
      place-items:center;
      background:
        radial-gradient(600px 400px at 50% 40%, rgba(255,147,179,.22), transparent 60%),
        linear-gradient(180deg, #fff0f3, #fff7f9);
      transition: transform .6s cubic-bezier(.4,0,.2,1), opacity .6s ease;
    }
    .intro.hide{
      transform: translateY(-100%);
      opacity:0;
      pointer-events:none;
    }

    .intro-content{
      text-align:center;
      padding:24px;
    }

    .intro-animals{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      margin-bottom:20px;
    }

    .intro-animal{
      width:80px; height:80px;
      opacity:0;
      transform: scale(0) rotate(-15deg);
      animation: introPop .5s ease forwards;
    }
    .intro-animal:nth-child(1){ animation-delay: .2s; }
    .intro-animal:nth-child(2){ animation-delay: .5s; }
    .intro-animal:nth-child(3){ animation-delay: .8s; }

    @keyframes introPop{
      0%{ transform: scale(0) rotate(-15deg); opacity:0; }
      60%{ transform: scale(1.15) rotate(3deg); opacity:1; }
      100%{ transform: scale(1) rotate(0deg); opacity:1; }
    }

    .intro-animal svg{ width:100%; height:100%; }

    /* Saludo más expresivo en la intro */
    .intro-animal .paw{
      transform-origin: 70% 80%;
      animation: introWave 1.8s ease-in-out infinite;
    }
    .intro-animal:nth-child(1) .paw{ animation-delay: .4s; }
    .intro-animal:nth-child(2) .paw{ animation-delay: .7s; }
    .intro-animal:nth-child(3) .paw{ animation-delay: 1s; }

    @keyframes introWave{
      0%, 100%{ transform: rotate(0deg); }
      12%{ transform: rotate(20deg); }
      24%{ transform: rotate(-12deg); }
      36%{ transform: rotate(20deg); }
      48%{ transform: rotate(-6deg); }
      60%{ transform: rotate(14deg); }
      72%{ transform: rotate(0deg); }
    }

    .intro-text{
      opacity:0;
      transform: translateY(14px);
      animation: introFade .6s ease forwards;
      animation-delay: 1.1s;
    }

    @keyframes introFade{
      to{ opacity:1; transform:translateY(0); }
    }

    .intro-text h1{
      margin:0 0 4px;
      font-size:22px;
      font-weight:800;
      color:var(--pink);
      letter-spacing:.02em;
    }
    .intro-text p{
      margin:0;
      font-size:13px;
      color:#999;
      font-weight:500;
    }

    /* Corazones flotando en intro (5s) */
    .hearts{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .heart{
      position:absolute;
      bottom:-30px;
      font-size:18px;
      opacity:0;
      animation: floatUp 5s ease-in forwards;
    }

    @keyframes floatUp{
      0%{ transform:translateY(0) scale(.6) rotate(0deg); opacity:0; }
      10%{ opacity:.7; }
      100%{ transform:translateY(-100vh) scale(1) rotate(35deg); opacity:0; }
    }

    /* =============================================
       MAIN INVITATION (hidden until intro ends)
       ============================================= */
    .page{
      display:grid;
      place-items:center;
      padding:18px;
      min-height:100svh;
      opacity:0;
      transform: translateY(20px);
      transition: opacity .5s ease .1s, transform .5s ease .1s;
    }
    .page.show{
      opacity:1;
      transform: translateY(0);
    }

    .wrap{ width:min(520px, 100%); }

    .card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      border: var(--borderW) solid var(--borderC);
      backdrop-filter: blur(8px);
    }

    .card::before, .card::after{
      content:"";
      position:absolute;
      width:250px;height:250px;
      pointer-events:none;
      opacity:.45;
    }
    .card::before{
      left:-120px; top:-130px;
      background: radial-gradient(circle at 35% 35%, rgba(255,147,179,.52), rgba(255,147,179,0) 62%);
    }
    .card::after{
      right:-140px; bottom:-170px;
      background: radial-gradient(circle at 40% 40%, rgba(240,111,150,.40), rgba(240,111,150,0) 65%);
    }

    /* ====== BARRA DE BIENVENIDA ====== */
    .welcome-bar{
      background: linear-gradient(180deg, #fce4ec, #fff0f3);
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid rgba(240,111,150,.15);
      position: relative;
      z-index: 1;
    }

    .welcome-bar .animal{
      display: inline-block;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .welcome-bar .animal svg .paw{
      transform-origin: 70% 80%;
      animation: wave 2.5s ease-in-out infinite;
    }
    .welcome-bar .animal:nth-child(1) svg .paw{ animation-delay: 0s; }
    .welcome-bar .animal:nth-child(3) svg .paw{ animation-delay: .4s; }
    .welcome-bar .animal:nth-child(5) svg .paw{ animation-delay: .8s; }

    @keyframes wave{
      0%, 100%{ transform: rotate(0deg); }
      15%{ transform: rotate(14deg); }
      30%{ transform: rotate(-8deg); }
      45%{ transform: rotate(14deg); }
      60%{ transform: rotate(-4deg); }
      75%{ transform: rotate(10deg); }
    }

    @keyframes popIn{
      0%{ transform: scale(0) rotate(-10deg); opacity:0; }
      60%{ transform: scale(1.1) rotate(2deg); opacity:1; }
      100%{ transform: scale(1) rotate(0deg); opacity:1; }
    }
    .welcome-bar .animal{ animation: popIn .5s ease forwards; opacity:0; }
    .welcome-bar .animal:nth-child(1){ animation-delay: .1s; }
    .welcome-bar .animal:nth-child(3){ animation-delay: .25s; }
    .welcome-bar .animal:nth-child(5){ animation-delay: .4s; }

    .dot-sep{
      width:6px; height:6px;
      background:var(--pink);
      border-radius:50%;
      opacity:.35;
      flex-shrink:0;
    }

    header{ padding:14px 16px 4px; text-align:center; }

    .title{
      font-weight:800;
      letter-spacing:.22em;
      font-size:14px;
      color:#585858;
    }

    .icon-wrap{
      margin:12px auto 4px;
      width:110px; height:110px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background: rgba(255,240,245,.65);
      border: 1px dashed rgba(240,111,150,.30);
      animation: softBounce 2.8s ease-in-out infinite;
    }

    @keyframes softBounce{
      0%, 100%{ transform: translateY(0); }
      50%{ transform: translateY(-6px); }
    }

    .icon-wrap svg{
      width:68px; height:68px;
      animation: rock 3.2s ease-in-out infinite;
      transform-origin: 50% 90%;
    }

    @keyframes rock{
      0%, 100%{ transform: rotate(0deg); }
      25%{ transform: rotate(4deg); }
      75%{ transform: rotate(-4deg); }
    }

    .subtitle{
      padding: 0 16px 12px;
      text-align:center;
      color:var(--muted);
      font-weight:300;
      line-height:1.55;
      font-size:14px;
    }

    .divider{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:0 16px;
      margin:2px 0 10px;
    }
    .divider span{
      height:2px;
      width:100%;
      max-width:140px;
      background: linear-gradient(90deg, transparent, rgba(240,111,150,.95), transparent);
      border-radius:999px;
      opacity:.70;
    }

    .when{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:10px;
      padding: 4px 16px 4px;
      text-align:center;
    }
    .when .side{
      font-weight:700;
      color:#4f4f4f;
      font-size:14px;
    }
    .when .big{
      font-size:42px;
      line-height:1;
      font-weight:800;
      color:#2b2b2b;
    }
    .when .month{
      grid-column:2;
      margin-top:0;
      font-size:12px;
      letter-spacing:.16em;
      color:#666;
      text-transform:uppercase;
      font-weight:700;
    }

    .where{
      padding: 8px 16px 0;
      text-align:center;
      font-size:13px;
      color:#5c5c5c;
      line-height:1.55;
    }
    .where b{ color:#3c3c3c; }

    .headline{
      padding: 14px 16px 8px;
      text-align:center;
      font-size:26px;
      font-weight:800;
      color: var(--pink);
    }

    .rsvp{
      padding: 6px 16px 12px;
      display:grid;
      gap:8px;
    }
    .rsvp p{
      margin:0;
      text-align:center;
      font-size:13px;
      color:#666;
      font-weight:700;
    }

    /* Row adjusted to name + adultos + niños */
    .row{
      display:grid;
      grid-template-columns: 1.2fr .8fr .8fr;
      gap:10px;
      align-items:start;
    }

    /* Field wrapper for label + input */
    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }
    .field input{
      width:100%;
      height: var(--btnH);
      padding: 0 12px;
      border-radius: var(--btnRadius);
      border:1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.92);
      outline:none;
      font-size:14px;
    }
    .field input:focus{
      border-color: rgba(240,111,150,.55);
      box-shadow: 0 0 0 4px rgba(240,111,150,.14);
    }

    .actions{
      display:grid;
      gap:10px;
      padding: 0 16px 16px;
    }

    .btn{
      height: var(--btnH);
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border-radius: var(--btnRadius);
      border:1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.96);
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      color:#333;
      text-decoration:none;
      transition: transform .06s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,.08);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{ border-color: rgba(240,111,150,.32); }
    .btn:active{ transform: translateY(1px); box-shadow: 0 8px 18px rgba(0,0,0,.07); }

    .btn.primary{
      background: linear-gradient(180deg, var(--pink2), var(--pink));
      color:white;
      border-color: rgba(255,255,255,.22);
    }
    .btn.outline{
      background: rgba(255,255,255,.92);
      border-color: rgba(240,111,150,.34);
      color: #2f2f2f;
    }
    .btn.disabled{
      cursor: default;
      background: rgba(255,255,255,.72);
      border-color: rgba(240,111,150,.18);
      color:#474747;
      box-shadow: none;
    }
    .btn.disabled:active{ transform:none; }
    .btn small{ font-weight:800; opacity:.85; }

    @media (max-width:420px){
      .row{ grid-template-columns:1fr 1fr; }
      .headline{ font-size:24px; }
      .welcome-bar{ gap:6px; padding: 12px 12px 8px; }
      .welcome-bar .animal{ width:42px; height:42px; }
      .intro-animal{ width:65px; height:65px; }
      .intro-text h1{ font-size:20px; }
    }
  </style>
</head>

<body>

  <!-- =============================================
       INTRO SPLASH (5 segundos)
       ============================================= -->
  <div class="intro" id="intro">
    <div class="hearts" id="hearts"></div>
    <div class="intro-content">
      <div class="intro-animals">

        <!-- Osito -->
        <div class="intro-animal">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="14" r="9" fill="#f3c8a0"/>
            <circle cx="44" cy="14" r="9" fill="#f3c8a0"/>

            <circle cx="30" cy="28" r="18" fill="#f3c8a0"/>
            <circle cx="24" cy="25" r="2" fill="#3a2a26"/>
            <circle cx="36" cy="25" r="2" fill="#3a2a26"/>
            <circle cx="25" cy="24" r=".8" fill="#fff"/>
            <circle cx="37" cy="24" r=".8" fill="#fff"/>
            <ellipse cx="30" cy="33" rx="6" ry="4" fill="#ffe0c8"/>

            <circle cx="19" cy="31" r="3" fill="#f8b4c8" opacity=".45"/>
            <circle cx="41" cy="31" r="3" fill="#f8b4c8" opacity=".45"/>
            <ellipse cx="30" cy="52" rx="14" ry="10" fill="#f3c8a0"/>

            <ellipse cx="50" cy="50" rx="5" ry="4" fill="#f3c8a0" transform="rotate(15,50,50)"/>
          </svg>
        </div>

        <!-- Nueva mascota: Perrito (reemplaza al conejo) -->
        <div class="intro-animal">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <!-- orejas -->
            <path d="M18 14 L26 6 L30 22 Z" fill="#8b5e3c" />
            <path d="M42 14 L34 6 L30 22 Z" fill="#8b5e3c" />

            <circle cx="30" cy="32" r="16" fill="#e9c9a6" />

            <circle cx="24" cy="30" r="2.2" fill="#2f2f2f" />
            <circle cx="36" cy="30" r="2.2" fill="#2f2f2f" />
            <circle cx="24.6" cy="29.4" r="0.6" fill="#fff"/>
            <circle cx="36.6" cy="29.4" r="0.6" fill="#fff"/>
            <!-- nariz boca -->
            <ellipse cx="30" cy="36" rx="2" ry="1.6" fill="#6b3f2b" />
            <path d="M26 38 q4 3 8 0" stroke="#6b3f2b" stroke-width="1" fill="none" stroke-linecap="round"/>
            <!-- manita saludando -->
            <g class="paw"><ellipse cx="12" cy="46" rx="4.6" ry="3.6" fill="#e9c9a6" transform="rotate(-20,12,46)"/></g>
            <ellipse cx="48" cy="50" rx="4.6" ry="3.6" fill="#e9c9a6" transform="rotate(15,48,50)"/>
          </svg>
        </div>

        <!-- Patito -->
        <div class="intro-animal">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="24" r="15" fill="#fff4b8"/>
            <path d="M28 9 q2-4 4 0" stroke="#f0d060" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M32 10 q2-3 3 1" stroke="#f0d060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <circle cx="24" cy="21" r="2" fill="#3a2a26"/>
            <circle cx="36" cy="21" r="2" fill="#3a2a26"/>
            <circle cx="25" cy="20" r=".8" fill="#fff"/>
            <circle cx="37" cy="20" r=".8" fill="#fff"/>
            <ellipse cx="30" cy="29" rx="5" ry="3" fill="#f0a830"/>
            <circle cx="20" cy="27" r="3" fill="#f8b4c8" opacity=".40"/>
            <circle cx="40" cy="27" r="3" fill="#f8b4c8" opacity=".40"/>
            <ellipse cx="30" cy="48" rx="14" ry="12" fill="#fff4b8"/>
            <g class="paw"><ellipse cx="11" cy="42" rx="5" ry="4" fill="#ffe88a" transform="rotate(-20,11,42)"/></g>
            <ellipse cx="49" cy="48" rx="5" ry="4" fill="#ffe88a" transform="rotate(15,49,48)"/>
            <ellipse cx="25" cy="58" rx="4" ry="2" fill="#f0a830"/>
            <ellipse cx="35" cy="58" rx="4" ry="2" fill="#f0a830"/>
          </svg>
        </div>

      </div>

      <div class="intro-text">
        <h1>Bienvenidos a mi Baby Shower</h1>
        <p>🍼 preparando todo para ti...</p>
      </div>
    </div>
  </div>

  <!-- =============================================
       INVITACIÓN PRINCIPAL
       ============================================= -->
  <div class="page" id="page">
    <main class="wrap">
      <section class="card" aria-label="Invitación">

        <div class="welcome-bar">
          <div class="animal">
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">

            </svg>
          </div>
          <div class="dot-sep"></div>
          <div class="animal">
            <!-- reemplazado: perrito en vez de conejo -->
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 14 L26 6 L30 22 Z" fill="#8b5e3c" />
              <path d="M42 14 L34 6 L30 22 Z" fill="#8b5e3c" />
              <circle cx="30" cy="32" r="16" fill="#e9c9a6" />

              <g class="paw"><ellipse cx="12" cy="46" rx="4.6" ry="3.6" fill="#e9c9a6" transform="rotate(-20,12,46)"/></g>
            </svg>
          </div>
          <div class="dot-sep"></div>
          <div class="animal">
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="24" r="15" fill="#fff4b8"/>
              <path d="M28 9 q2-4 4 0" stroke="#f0d060" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M32 10 q2-3 3 1" stroke="#f0d060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <circle cx="24" cy="21" r="2" fill="#3a2a26"/><circle cx="36" cy="21" r="2" fill="#3a2a26"/>
              <circle cx="25" cy="20" r=".8" fill="#fff"/><circle cx="37" cy="20" r=".8" fill="#fff"/>
              <ellipse cx="30" cy="29" rx="5" ry="3" fill="#f0a830"/>
              <circle cx="20" cy="27" r="3" fill="#f8b4c8" opacity=".40"/>
              <circle cx="40" cy="27" r="3" fill="#f8b4c8" opacity=".40"/>
              <ellipse cx="30" cy="48" rx="14" ry="12" fill="#fff4b8"/>
              <g class="paw"><ellipse cx="11" cy="42" rx="5" ry="4" fill="#ffe88a" transform="rotate(-20,11,42)"/></g>

              <ellipse cx="25" cy="58" rx="4" ry="2" fill="#f0a830"/>
              <ellipse cx="35" cy="58" rx="4" ry="2" fill="#f0a830"/>
            </svg>
          </div>
        </div>

        <header>
          <div class="title">MI BABY SHOWER</div>
          <div class="icon-wrap">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="82" r="8" fill="#f8b4c8" stroke="#e8819e" stroke-width="2"/>
              <circle cx="68" cy="82" r="8" fill="#f8b4c8" stroke="#e8819e" stroke-width="2"/>
              <circle cx="32" cy="82" r="3" fill="#fff" opacity=".6"/>
              <circle cx="68" cy="82" r="3" fill="#fff" opacity=".6"/>

                <polygon points="15,30 16,33 19,33 17,35 18,38 15,36 12,38 13,35 11,33 14,33"/>

        <div class="subtitle">Queremos celebrar contigo la futura llegada de nuestra bebé</div>
        <div class="divider" aria-hidden="true"><span></span><span></span></div>

        <div class="when">
          <div class="side" id="dayName">Domingo</div>
          <div class="big" id="dayNum">08</div>
          <div class="side" id="timeTxt">11:00 a.m.</div>
          <div class="month" id="monthTxt">Marzo</div>
        </div>

        <div class="where">
          <b id="placeName">Old West Restaurant</b><br/>
          <span id="placeAddr">10 calle 4-33 Barrio Colombita, Coatepeque.</span>
        </div>

        <div class="headline">¡Te esperamos!</div>

        <div class="rsvp">
          <p>Confirma tu asistencia</p>
          <div class="row">
            <div class="field">
              <label for="guestName">Tu nombre</label>
              <input id="guestName" type="text" placeholder="Nombre" autocomplete="name" />
            </div>

            <div class="field">
              <label for="adultCount"># adultos</label>
              <input id="adultCount" type="number" inputmode="numeric" min="0" value="1" placeholder="# adultos" />
            </div>

            <div class="field">
              <label for="childCount"># niños</label>
              <input id="childCount" type="number" inputmode="numeric" min="0" value="0" placeholder="# niños" />
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="btnWhatsApp">Confirmar por WhatsApp</button>
          <a class="btn outline" id="btnMaps" target="_blank" rel="noopener">Ver ubicación</a>
          <div class="btn disabled" aria-live="polite">
            Tiempo faltante: <small id="countdown">—</small>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ====== INTRO → INVITACIÓN ======
    // Corazones flotando durante la intro
    const heartsContainer = document.getElementById("hearts");
    const heartChars = ["♥","♡","💕","💗"];
    for(let i = 0; i < 12; i++){
      const h = document.createElement("span");
      h.className = "heart";
      h.textContent = heartChars[i % heartChars.length];
      h.style.left = Math.random() * 90 + 5 + "%";
      h.style.animationDelay = (Math.random() * 2.2 + .3) + "s";
      h.style.fontSize = (14 + Math.random() * 14) + "px";
      heartsContainer.appendChild(h);
    }

    // Después de 5 segundos, ocultar intro y mostrar invitación
    setTimeout(() => {
      document.getElementById("intro").classList.add("hide");
      document.getElementById("page").classList.add("show");
    }, 5000);

    // ====== DATOS DEL EVENTO ======
    const EVENT = {
      dateISO: "2026-03-08T11:00:00",
      dayName: "Domingo",
      dayNum: "08",
      monthTxt: "Marzo",
      timeTxt: "11:00 a.m.",
      placeName: "Old West Restaurant",
      placeAddr: "10 calle 4-33 Barrio Colombita, Coatepeque.",
      whatsappNumber: "50241415151",
      mapsUrl: "https://maps.google.com/?q=Old%20West%20Restaurant%20Coatepeque"
    };

    dayName.textContent = EVENT.dayName;
    dayNum.textContent = EVENT.dayNum;
    monthTxt.textContent = EVENT.monthTxt;
    timeTxt.textContent = EVENT.timeTxt;
    placeName.textContent = EVENT.placeName;
    placeAddr.textContent = EVENT.placeAddr;
    btnMaps.href = EVENT.mapsUrl;

    // URL params: name, adults, kids
    const params = new URLSearchParams(location.search);
    const pName = params.get("name");
    const pAdults = params.get("adults");
    const pKids = params.get("kids");
    if (pName) guestName.value = pName;
    if (pAdults && !Number.isNaN(Number(pAdults))) adultCount.value = String(Math.max(0, Number(pAdults)));
    if (pKids && !Number.isNaN(Number(pKids))) childCount.value = String(Math.max(0, Number(pKids)));

    function buildMessage(){
      const name = (guestName.value || "").trim() || "Invitado/a";
      const adults = Math.max(0, Number(adultCount.value || 0));
      const kids = Math.max(0, Number(childCount.value || 0));
      return `Hola. Soy ${name}.\nConfirmo mi asistencia al Baby Shower.\nAdultos: ${adults}.\nNiños: ${kids}.\n¡Gracias!`;
    }

    btnWhatsApp.addEventListener("click", () => {
      const text = encodeURIComponent(buildMessage());
      window.open(`https://wa.me/${EVENT.whatsappNumber}?text=${text}`, "_blank", "noopener");
      if (navigator.vibrate) navigator.vibrate(18);
    });

    const eventDate = new Date(EVENT.dateISO);
    const pad2 = (n) => String(n).padStart(2, "0");

    function formatCountdown(ms){
      if (ms <= 0) return "¡Hoy!";
      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;
      if (days > 0) return `${days}d ${pad2(hours)}h ${pad2(mins)}m`;
      return `${pad2(hours)}h ${pad2(mins)}m ${pad2(secs)}s`;
    }

    function tick(){
      countdown.textContent = formatCountdown(eventDate - new Date());
    }
    tick();
    setInterval(tick, 250);
  </script>
</body>
